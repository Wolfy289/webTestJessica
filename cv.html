<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diensten - Jessica Damhof</title>

    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <style>
            .diensten {
                padding: 100px 20px;
            }
    
            .diensten-container {
                max-width: 1200px;
                margin: 0 auto;
            }
    
            .diensten-intro {
                text-align: center;
                margin-bottom: 80px;
            }
    
            .diensten-intro h2 {
                font-family: montserrat, sans-serif;
                font-size: 2.5rem;
                margin-bottom: 30px;
                color: var(--text-dark);
            }
    
            .diensten-intro p {
                font-size: 15px;
                font-family: avenir-lt-w01_35-light1475496, sans-serif;
                line-height: 1.6;
                color: var(--text-light);
                max-width: 800px;
                margin: 0 auto 30px;
            }
    
            .diensten-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 60px;
                align-items: flex-start;
                margin-bottom: 80px;
            }
    
            .diensten-content {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
    
            .diensten-content h3 {
                font-family: montserrat, sans-serif;
                font-size: 1.8rem;
                margin-bottom: 15px;
                color: var(--text-dark);
            }
    
            .diensten-content p {
                font-size: 15px;
                font-family: avenir-lt-w01_35-light1475496, sans-serif;
                line-height: 1.6;
                color: var(--text-light);
                margin-bottom: 15px;
            }
    
            .diensten-media {
                width: 100%;
            }
    
            .diensten-media img {
                width: 60%;
                border-radius: 15px;
                object-fit: cover;
                box-shadow: var(--shadow);
                margin-bottom: 20px;
            }
    
            .diensten-media video {
                width: 100%;
                border-radius: 15px;
                box-shadow: var(--shadow);
            }
    
            .cta-button {
                display: inline-block;
                background-color: var(--primary-color, #333);
                color: white;
                padding: 12px 30px;
                border-radius: 8px;
                text-decoration: none;
                font-family: montserrat, sans-serif;
                font-size: 14px;
                font-weight: 600;
                transition: background-color 0.3s ease;
                width: fit-content;
                margin-top: 20px;
            }
    
            .cta-button:hover {
                background-color: var(--primary-hover, #555);
            }
    
            .social-links {
                display: flex;
                gap: 20px;
                margin-top: 20px;
                align-items: center;
            }
    
            .social-links a {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 45px;
                height: 45px;
                border-radius: 50%;
                background-color: var(--bg-light, #f5f5f5);
                transition: background-color 0.3s ease;
            }
    
            .social-links a:hover {
                background-color: var(--primary-color, #333);
            }
    
            .social-links img {
                width: 24px;
                height: 24px;
                filter: brightness(0.7);
            }
    
            .social-links a:hover img {
                filter: brightness(1);
            }
    
            /* MOBIEL */
            @media (max-width: 768px) {
                .diensten {
                    padding: 60px 20px;
                }
    
                .diensten-intro h2 {
                    font-size: 2rem;
                }
    
                .diensten-grid {
                    grid-template-columns: 1fr;
                    gap: 40px;
                }
    
                .diensten-media {
                    order: -1;
                }
            }
    </style>
</head>

<body>

<!-- HEADER -->
<div id="header-container"></div>

<!-- DIENSTEN PAGINA -->
<main class="diensten-page">

    <section class="diensten">
        <div class="diensten-container">

                    <div>
                        <p>
                           Wil je weten welke opleidingen ik heb gedaan en waar ik stage heb gelopen.
                        </p>
                    </div>

                    <a href="/webTestJessica/CV.pdf" class="cta-button" target="_blank">Naar website</a>
                        

                <!-- TEKST RECHTS -->
                

            </div>

        </div>
    </section>

</main>

<!-- FOOTER -->
<div id="footer-container"></div>

<!-- SCRIPT -->
<script>
    // Header laden
    fetch('header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header-container').innerHTML = data;
        });

    // Footer laden
    fetch('footer.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('footer-container').innerHTML = data;
        });
</script>

</body>
</html>
