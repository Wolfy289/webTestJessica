<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV - Jessica Damhof</title>

    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">
    <style>
        .cv {
            padding: 150px 20px;
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cv-container {
            max-width: 600px;
            text-align: center;
        }

        .cv-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .cv-content h2 {
            font-family: montserrat, sans-serif;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .cv-content p {
            font-size: 15px;
            font-family: avenir-lt-w01_35-light1475496, sans-serif;
            line-height: 1.6;
            color: var(--text-light);
            margin: 0;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--primary-color, #333);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-family: montserrat, sans-serif;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.3s ease;
            margin-top: 20px;
        }

        .cta-button:hover {
            background-color: var(--primary-hover, #555);
        }

        /* MOBIEL */
        @media (max-width: 768px) {
            .cv {
                padding: 100px 20px;
                min-height: 50vh;
            }

            .cv-content h2 {
                font-size: 2rem;
            }

            .cv-container {
                max-width: 100%;
            }
        }

    </style>
</head>

<body>

<!-- HEADER -->
<div id="header-container"></div>

<!-- CV PAGINA -->
<main class="cv-page">

    <section class="cv">
        <div class="cv-container">

            <div class="cv-content">

                <h2>Mijn CV</h2>

                <p>
                    Wil je weten welke opleidingen ik heb gedaan en waar ik stage heb gelopen?
                </p>

                <a href="CV.pdf" class="cta-button" target="_blank">Download CV</a>

            </div>

        </div>
    </section>

</main>

<!-- FOOTER -->
<div id="footer-container"></div>

<!-- SCRIPT -->
<script>
    // Header laden
    fetch('header.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('header-container').innerHTML = data;
        });

    // Footer laden
    fetch('footer.html')
        .then(res => res.text())
        .then(data => {
            document.getElementById('footer-container').innerHTML = data;
        });
</script>

</body>
</html>
