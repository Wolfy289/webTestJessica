<header class="header">
    <div class="header-container">
        <div class="logo">
            <h1>Jessica</h1>
        </div>
        <nav class="nav">
            <ul>
                <li><a href="/webTestJessica" class="nav-link">Home</a></li>
                <li><a href="/webTestJessica/over" class="nav-link">Over</a></li>
                <li><a href="/webTestJessica/diensten" class="nav-link">diensten</a></li>
                <li><a href="/webTestJessica/contact" class="nav-link">contact</a></li>
                <li><a href="/webTestJessica/klanten" class="nav-link">klanten</a></li>
                <li><a href="/webTestJessica/cv" class="nav-link">cv</a></li>
                <li><a href="/webTestJessica/portofio" class="nav-link">portofio</a></li>
            </ul>
        </nav>
    </div>
</header>

<script>
fetch('header.html')
    .then(res => res.text())
    .then(data => {
        const container = document.getElementById('header-container');
        container.innerHTML = data;

        // ✅ ACTIVE FIX HIER (NIET in header.html!)
        const currentPath = window.location.pathname.toLowerCase();
        const links = container.querySelectorAll(".nav-link");

        links.forEach(link => {
            const linkPath = link.getAttribute("href").toLowerCase();

            if (currentPath.includes(linkPath)) {
                link.classList.add("active");
            }
        });
    });

fetch('footer.html')
    .then(res => res.text())
    .then(data => {
        document.getElementById('footer-container').innerHTML = data;
    });
</script>
